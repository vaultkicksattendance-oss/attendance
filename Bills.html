<script>
// ══════════════════════════════════
// CONFIG
// ══════════════════════════════════
const SCRIPT_URL   = "https://script.google.com/macros/library/d/1ZH6pkydBzEzfm__I_WC2bsJC3RHJfaWEIoKsKx77sIFkyU42bV-e-97X/7";
const CLOUD_NAME   = "drjgoxwfu";
const UPLOAD_PRESET= "puma_bills";

// ══════════════════════════════════
// FIXED FILE HANDLING (STABLE)
// ══════════════════════════════════
function handleFile(e){
  const file=e.target.files[0];
  if(!file) return;

  if(file.size>10*1024*1024){
    showE("❌ Max file size 10MB");
    return;
  }

  fileName=file.name;
  fileMime=file.type || "application/octet-stream";

  const reader=new FileReader();
  reader.onload=function(ev){
    fileData=ev.target.result.split(",")[1];

    const isImg=fileMime.startsWith("image/");

    if(isImg){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement("canvas");
        let w=img.width,h=img.height;

        if(w>1200){
          h=h*(1200/w);
          w=1200;
        }

        canvas.width=w;
        canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);

        canvas.toBlob(function(blob){
          fileBlob=blob;

          const r2=new FileReader();
          r2.onload=e2=>fileData=e2.target.result.split(",")[1];
          r2.readAsDataURL(blob);

          document.getElementById("prevImg").src=canvas.toDataURL("image/jpeg",0.8);
          document.getElementById("prevImg").style.display="block";
          document.getElementById("prevFile").style.display="none";
          document.getElementById("fupPH").style.display="none";
          document.getElementById("chgFile").style.display="block";

          showI("✅ Image ready");
        },"image/jpeg",0.8);

        fileMime="image/jpeg";
        fileName=fileName.replace(/\.[^.]+$/,".jpg");
      };
      img.src=ev.target.result;

    } else {
      fileBlob=file;

      document.getElementById("prevImg").style.display="none";
      document.getElementById("prevFile").innerText="📄 "+file.name;
      document.getElementById("prevFile").style.display="block";
      document.getElementById("fupPH").style.display="none";
      document.getElementById("chgFile").style.display="block";

      showI("✅ File ready");
    }
  };

  reader.readAsDataURL(file);
}

// ══════════════════════════════════
// STRONG VALIDATION
// ══════════════════════════════════
function validateForm(){
  if(!sel) return "Select bill type";
  if(!fileData) return "Upload file";
  if(!bDate.value) return "Enter bill date";
  if(!bAmt.value || parseFloat(bAmt.value)<=0) return "Invalid amount";
  if(!pStat.value) return "Select payment status";

  if((pStat.value==="Paid"||pStat.value==="Partial") && !aPaid.value){
    return "Enter paid amount";
  }

  return null;
}

// ══════════════════════════════════
// SUBMIT (CLEAN FLOW)
// ══════════════════════════════════
function doSubmit(){

  const err=validateForm();
  if(err){ showE("❌ "+err); return; }

  showE("");
  dis(true);
  setSt("Uploading...");

  const uploadId="BILL-"+store.id+"-"+Date.now();

  uploadToCloudinary(fileData,fileMime,uploadId,"puma-bills",function(err,url,name){

    if(err){
      dis(false);
      showE(err);
      return;
    }

    setSt("Saving...");

    callScript("uploadBill",{
      storeId:store.id,
      storeName:store.name,
      billType:BT[sel].label,
      billDate:bDate.value,
      billMonth:bMonth.value,
      billYear:bYear.value,
      amount:parseFloat(bAmt.value)||0,
      paymentStatus:pStat.value,
      amountPaid:parseFloat(aPaid.value)||0,
      fileUrl:url,
      fileName:name
    },function(res){

      dis(false);
      setSt("");

      if(res.success){
        showPop("✅","Success","Bill submitted");
        clearForm();
      }else{
        showE("❌ Submit failed");
      }
    });

  });
}

// ══════════════════════════════════
// CLOUDINARY SAFE UPLOAD
// ══════════════════════════════════
function uploadToCloudinary(base64,mime,id,folder,cb){

  const fd=new FormData();
  fd.append("file","data:"+mime+";base64,"+base64);
  fd.append("upload_preset",UPLOAD_PRESET);
  fd.append("public_id",id);
  fd.append("folder",folder);

  fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`,{
    method:"POST",
    body:fd
  })
  .then(r=>r.json())
  .then(r=>{
    if(r.secure_url){
      cb(null,r.secure_url,r.original_filename);
    }else{
      cb("Upload error");
    }
  })
  .catch(()=>cb("Upload failed"));
}

</script>
